<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Production Chat UI</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script defer src="/socket.io/socket.io.js"></script>

    <style>
        /* Prevent default document scrolling behaviors and manage mobile bounds */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom thin scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.3);
            border-radius: 9999px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.4);
        }

        /* System theme instant detection block before parsing page layout */
        :root {
            --brand-50: #f0fdf4;
            --brand-500: #22c55e;
            --brand-600: #16a34a;
        }

        html.dark {
            color-scheme: dark;
        }

        /* Message animation */
        @keyframes msgSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-msg-in {
            animation: msgSlideIn 0.18s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        /* Focus ring overrides for extreme clarity and accessibility */
        /* textarea:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--brand-500);
            outline-offset: 2px;
        } */
    </style>

    <script>
        // Critical Path Setup: Avoid dark-mode flashing
        (function () {
            const storedTheme = localStorage.getItem('chat-theme');
            if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
